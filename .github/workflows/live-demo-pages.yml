name: Live Demo Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/live-demo-pages.yml"
      - "docs/live-demo/**"
      - "assets/screenshots/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: live-demo-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site/assets
          cp docs/live-demo/index.html site/index.html
          cp docs/live-demo/notes.html site/notes.html
          cp docs/live-demo/styles.css site/styles.css
          cp assets/screenshots/ctx-viewer-working-context.jpg site/assets/
          cp assets/screenshots/ctx-viewer-commit-thread.jpg site/assets/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
